name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: Configure CloudFront SPA routing (404/403 → index.html)
        run: |
          # Get current distribution config and ETag
          DIST_CONFIG=$(aws cloudfront get-distribution-config \
            --id ${{ secrets.AWS_CLOUDFRONT_DIST_ID }})
          ETAG=$(echo "$DIST_CONFIG" | python3 -c "import sys,json; print(json.load(sys.stdin)['ETag'])")

          # Inject custom error responses for SPA routing
          echo "$DIST_CONFIG" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          config = data['DistributionConfig']
          config['CustomErrorResponses'] = {
            'Quantity': 2,
            'Items': [
              {
                'ErrorCode': 404,
                'ResponsePagePath': '/index.html',
                'ResponseCode': '200',
                'ErrorCachingMinTTL': 10
              },
              {
                'ErrorCode': 403,
                'ResponsePagePath': '/index.html',
                'ResponseCode': '200',
                'ErrorCachingMinTTL': 10
              }
            ]
          }
          print(json.dumps(config))
          " > /tmp/updated-dist-config.json

          aws cloudfront update-distribution \
            --id ${{ secrets.AWS_CLOUDFRONT_DIST_ID }} \
            --distribution-config file:///tmp/updated-dist-config.json \
            --if-match "$ETAG"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DIST_ID }} \
            --paths "/*"
