services:
  # Backend — Node.js Web Service
  - type: web
    name: fieldops-api
    env: node
    region: oregon
    plan: free
    rootDir: fieldops-manager/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      # Set these in the Render dashboard — do NOT put real values here
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

  # Frontend — Static Site with SPA routing
  - type: static
    name: fieldops-frontend
    rootDir: fieldops-manager/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      # SPA fallback — serve index.html for all paths so React Router works on refresh
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
